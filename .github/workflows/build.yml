- name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug 2>&1 | tail -50
          echo "=== Searching for APK ==="
          find / -name "*.apk" 2>/dev/null | grep -v proc || true

      - name: Copy APK
        if: always()
        run: |
          mkdir -p output
          find / -name "*.apk" 2>/dev/null | grep -v proc | xargs -I {} cp {} output/ 2>/dev/null || true
          ls -la output/
