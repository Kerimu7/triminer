name: Build TriMiner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake build-essential ccache
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug 2>&1 | tail -50
          echo "=== Searching for APK ==="
          find / -name "*.apk" 2>/dev/null | grep -v proc || true

      - name: Copy APK
        if: always()
        run: |
          mkdir -p output
          find / -name "*.apk" 2>/dev/null | grep -v proc | xargs -I {} cp {} output/ 2>/dev/null || true
          ls -la output/

      - name: Find and upload APK
        if: always()
        run: |
          mkdir -p output
          find . -name "*.apk" 2>/dev/null -exec cp {} output/ \;
          find ~/.buildozer -name "*.apk" 2>/dev/null -exec cp {} output/ \; || true
          ls -la output/ || echo "No APK found"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TriMiner-APK
          path: output/
          retention-days: 30
